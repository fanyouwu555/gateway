apiVersion: v1
kind: Secret
metadata:
  name: ai-gateway-secrets
  namespace: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # 网关 API Keys（客户端调用网关时使用的 key，多个用逗号分隔）
  API_KEYS: "sk-gateway-key-1,sk-gateway-key-2"
  API_ADMIN_KEYS: "sk-admin-key-1"

  # Provider API Keys（网关调用上游 AI 服务时使用的 key）
  OPENAI_API_KEY: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  DEEPSEEK_API_KEY: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  MOONSHOT_API_KEY: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  VOLCANO_API_KEY: "ark-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  KIMI_CODE_API_KEY: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
