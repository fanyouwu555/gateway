apiVersion: v1
kind: Secret
metadata:
  name: ai-gateway-secrets
  namespace: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # 网关 API Keys（客户端调用网关时使用的 key）
  # 生产环境必须通过 CI/CD、Sealed Secrets 或 External Secrets Operator 注入
  API_KEYS: "<REPLACE_IN_CI>"
  API_ADMIN_KEYS: "<REPLACE_IN_CI>"

  # Provider API Keys（网关调用上游 AI 服务时使用的 key）
  OPENAI_API_KEY: "<REPLACE_IN_CI>"
  DEEPSEEK_API_KEY: "<REPLACE_IN_CI>"
  MOONSHOT_API_KEY: "<REPLACE_IN_CI>"
  VOLCANO_API_KEY: "<REPLACE_IN_CI>"
  KIMI_CODE_API_KEY: "<REPLACE_IN_CI>"
