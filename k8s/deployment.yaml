apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway
  namespace: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-gateway
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/version: "1.0.0"
    spec:
      containers:
        - name: gateway
          image: ai-gateway:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ai-gateway-config
          env:
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: ai-gateway-secrets
                  key: API_KEYS
            - name: API_ADMIN_KEYS
              valueFrom:
                secretKeyRef:
                  name: ai-gateway-secrets
                  key: API_ADMIN_KEYS
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-gateway-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-gateway-secrets
                  key: DEEPSEEK_API_KEY
                  optional: true
            - name: MOONSHOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-gateway-secrets
                  key: MOONSHOT_API_KEY
                  optional: true
            - name: VOLCANO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-gateway-secrets
                  key: VOLCANO_API_KEY
                  optional: true
            - name: KIMI_CODE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-gateway-secrets
                  key: KIMI_CODE_API_KEY
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config-volume
              mountPath: /app/conf
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: ai-gateway-config-files
            optional: true
