apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-gateway.fullname" . }}
  labels:
    {{- include "ai-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "ai-gateway.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ai-gateway.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gateway
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ai-gateway.fullname" . }}-config
          env:
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-secrets
                  key: API_KEYS
            - name: API_ADMIN_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-secrets
                  key: API_ADMIN_KEYS
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-secrets
                  key: DEEPSEEK_API_KEY
                  optional: true
            - name: MOONSHOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-secrets
                  key: MOONSHOT_API_KEY
                  optional: true
            - name: VOLCANO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-secrets
                  key: VOLCANO_API_KEY
                  optional: true
            - name: KIMI_CODE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-secrets
                  key: KIMI_CODE_API_KEY
                  optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
