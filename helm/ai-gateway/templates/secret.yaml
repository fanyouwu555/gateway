apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-gateway.fullname" . }}-secrets
  labels:
    {{- include "ai-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  API_KEYS: {{ .Values.secrets.apiKeys | quote }}
  API_ADMIN_KEYS: {{ .Values.secrets.adminKeys | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  DEEPSEEK_API_KEY: {{ .Values.secrets.deepseekApiKey | quote }}
  MOONSHOT_API_KEY: {{ .Values.secrets.moonshotApiKey | quote }}
  VOLCANO_API_KEY: {{ .Values.secrets.volcanoApiKey | quote }}
  KIMI_CODE_API_KEY: {{ .Values.secrets.kimiCodeApiKey | quote }}
